<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Character 4</title>
<style>
  :root { color-scheme: dark; }
  body { margin:0; min-height:100vh; display:grid; place-items:center; padding:28px; font-family:"Segoe UI", Arial, sans-serif; color:white; background: radial-gradient(circle at top right, rgba(146, 117, 255, 0.2), transparent 45%), #191533; }
  .card { width:min(1080px,95vw); background:#251f4f; border:1px solid rgba(255,255,255,.16); border-radius:18px; overflow:hidden; }
  .layout { display:grid; grid-template-columns: minmax(0,1fr) minmax(260px,340px); }
  .content { padding:26px; }
  .portrait { height:260px; border-radius:14px; background:linear-gradient(145deg,#7e55df,#2c2370); display:grid; place-items:center; font-size:3rem; border:1px solid rgba(255,255,255,.2); }
  .relief { border-left:1px solid rgba(255,255,255,.16); background:linear-gradient(to left, rgba(9,10,22,.85), rgba(9,10,22,.3)), url('reliefs/char4relief.png') right bottom/contain no-repeat; min-height:100%; }
  .back { display:inline-block; margin-top:16px; color:#c5b0ff; border:1px solid #c5b0ff; padding:10px 16px; border-radius:10px; text-decoration:none; }
  @media (max-width:860px){ .layout{grid-template-columns:1fr;} .relief{border-left:0;border-top:1px solid rgba(255,255,255,.16); min-height:380px; background:linear-gradient(to top, rgba(9,10,22,.85), rgba(9,10,22,.3)), url('reliefs/char4relief.png') center bottom/contain no-repeat;} }
</style>
</head>
<body>
  <article class="card">
    <div class="layout">
      <section class="content">
        <h1>Character 4 · Night Sniper</h1>
        <div class="portrait" aria-hidden="true">D4</div>
        <p>Long-range specialist with excellent precision attacks and zone control. Excels at controlling the pace of battle.</p>
        <a class="back" href="index.html">← Back to profiles</a>
      </section>
      <aside class="relief" aria-label="Character 4 full-body relief artwork"></aside>
    </div>
  </article>
</body>
</html>
