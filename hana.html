<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hana's Characters</title>
<style>
  :root {
    color-scheme: dark;
    --bg-top: #090a14;
    --bg-bottom: #121426;
    --panel: rgba(255, 255, 255, 0.06);
    --border: rgba(255, 255, 255, 0.14);
    --text-subtle: #cdd5f2;
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    min-height: 100vh;
    background: radial-gradient(circle at 15% 0%, rgba(140, 201, 255, 0.16), transparent 42%),
                linear-gradient(165deg, var(--bg-top), var(--bg-bottom));
    color: #fff;
  }

  .wrapper {
    width: min(1040px, 92vw);
    margin: 0 auto;
    padding: 44px 0 72px;
  }

  a.home-link {
    color: #aad4ff;
    text-decoration: none;
    display: inline-block;
    margin-bottom: 20px;
  }

  h1 {
    margin: 0;
    font-size: clamp(2rem, 4vw, 3rem);
    text-align: center;
    letter-spacing: 0.5px;
  }

  .subtitle {
    text-align: center;
    color: var(--text-subtle);
    max-width: 760px;
    margin: 14px auto 36px;
    line-height: 1.6;
  }

  .profiles {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .card {
    text-decoration: none;
    color: inherit;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 16px;
    display: grid;
    grid-template-columns: 160px minmax(0, 1fr);
    gap: 16px;
    align-items: center;
    transition: transform .22s ease, border-color .22s ease;
  }

  .card:hover,
  .card:focus-visible {
    transform: translateY(-3px);
    border-color: rgba(140, 201, 255, 0.8);
    outline: none;
  }

  .thumb {
    width: auto;
    height: auto;
    max-width: 160px;
    max-height: 200px;
    object-fit: contain;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    background: rgba(255,255,255,0.06);
  }

  .name { margin: 0 0 8px; font-size: 1.2rem; font-weight: 650; }
  .summary { margin: 0; color: var(--text-subtle); line-height: 1.45; }

  @media (max-width: 700px) {
    .card {
      grid-template-columns: 1fr;
    }

    .thumb {
      max-height: 300px;
    }
  }
</style>
</head>
<body>
  <main class="wrapper">
    <a class="home-link" href="index.html">← Back to landing page</a>
    <h1>Hana's Characters</h1>
    <p class="subtitle">Browse the current Hana character collection.</p>

    <section class="profiles" aria-label="Hana character profiles">
      <a href="hanacharacter1.html" class="card">
        <img class="thumb" src="images/hanachar1.png" alt="Bethen Kal">
        <div>
          <h2 class="name">Bethen Kal</h2>
          <p class="summary">Conjuration wizard from the frigid north, seeking to master magic and bring it back home.</p>
        </div>
      </a>
    </section>
  </main>
</body>
</html>
