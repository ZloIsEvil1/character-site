<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foxxy's Characters</title>
<style>
  :root {
    color-scheme: dark;
    --bg-top: #090a14;
    --bg-bottom: #121426;
    --panel: rgba(255, 255, 255, 0.06);
    --border: rgba(255, 255, 255, 0.14);
    --text-subtle: #cdd5f2;
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    min-height: 100vh;
    background: radial-gradient(circle at 15% 0%, rgba(255, 148, 238, 0.14), transparent 42%),
                linear-gradient(165deg, var(--bg-top), var(--bg-bottom));
    color: #fff;
  }

  .wrapper {
    width: min(1040px, 92vw);
    margin: 0 auto;
    padding: 44px 0 72px;
  }

  a.home-link {
    color: #ffb4f2;
    text-decoration: none;
    display: inline-block;
    margin-bottom: 20px;
  }

  h1 {
    margin: 0;
    font-size: clamp(2rem, 4vw, 3rem);
    text-align: center;
    letter-spacing: 0.5px;
  }

  .subtitle {
    text-align: center;
    color: var(--text-subtle);
    max-width: 760px;
    margin: 14px auto 36px;
    line-height: 1.6;
  }

  .notice {
    margin: 0 auto 32px;
    max-width: 780px;
    padding: 20px;
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.12);
    color: var(--text-subtle);
    text-align: center;
  }
</style>
</head>
<body>
  <main class="wrapper">
    <a class="home-link" href="index.html">← Back to landing page</a>
    <h1>Foxxy's Characters</h1>
    <p class="subtitle">The Foxxy gallery is being prepared. Check back soon for the character lineup.</p>
    <div class="notice">
      Foxxy's character pages will be added here when ready. For now, start with Hornet's gallery and return later for the new section.
    </div>
  </main>
</body>
</html>
