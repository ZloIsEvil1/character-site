<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Character Select</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #1a1a2e, #16213e);
    color: white;
    text-align: center;
  }

  h1 {
    margin-top: 30px;
    font-size: 2.5em;
  }

  .container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 30px;
    padding: 50px;
    max-width: 900px;
    margin: auto;
  }

  .character {
    text-decoration: none;
    color: white;
    transition: transform 0.3s ease;
  }

  .character img {
    width: 100%;
    border-radius: 15px;
    transition: all 0.3s ease;
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
  }

  .character:hover img {
    transform: scale(1.08);
    box-shadow: 0 0 20px #00f7ff;
  }

  .name {
    margin-top: 10px;
    font-size: 1.2em;
    letter-spacing: 1px;
  }

</style>
</head>

<body>

<h1>Select Your Character</h1>

<div class="container">

  <a href="character1.html" class="character">
    <img src="images/char1.jpg" alt="Character 1">
    <div class="name">Character 1</div>
  </a>

  <a href="character2.html" class="character">
    <img src="images/char2.jpg" alt="Character 2">
    <div class="name">Character 2</div>
  </a>

  <a href="character3.html" class="character">
    <img src="images/char3.jpg" alt="Character 3">
    <div class="name">Character 3</div>
  </a>

  <a href="character4.html" class="character">
    <img src="images/char4.jpg" alt="Character 4">
    <div class="name">Character 4</div>
  </a>

  <a href="character5.html" class="character">
    <img src="images/char5.jpg" alt="Character 5">
    <div class="name">Character 5</div>
  </a>

</div>

</body>
</html>
