<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Character Select</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #1a1a2e, #16213e);
    color: white;
    text-align: center;
  }

  h1 {
    margin: 30px 0;
    font-size: 2.5em;
  }

  .container {
    display: flex;
    flex-direction: column;   /* 🔥 vertical stack */
    align-items: center;
    gap: 40px;
    padding-bottom: 50px;
  }

  .character {
    text-decoration: none;
    color: white;
    width: 500px; /* 🔥 controls overall size */
    transition: transform 0.3s ease;
  }

  .character img {
    width: 100%;
    height: auto;  /* ✅ keeps aspect ratio */
    border-radius: 20px;
    transition: all 0.3s ease;
    box-shadow: 0 0 15px rgba(0,0,0,0.6);
  }

  .character:hover img {
    transform: scale(1.05);
    box-shadow: 0 0 30px #00f7ff;
  }

  .name {
    margin-top: 12px;
    font-size: 1.4em;
    letter-spacing: 1px;
  }

</style>
</head>

<body>

<h1>Select Your Character</h1>

<div class="container">

  <a href="character1.html" class="character">
    <img src="images/char1.png">
    <div class="name">Character 1</div>
  </a>

  <a href="character2.html" class="character">
    <img src="images/char2.png">
    <div class="name">Character 2</div>
  </a>

  <a href="character3.html" class="character">
    <img src="images/char3.png">
    <div class="name">Character 3</div>
  </a>

  <a href="character4.html" class="character">
    <img src="images/char4.png">
    <div class="name">Character 4</div>
  </a>

  <a href="character5.html" class="character">
    <img src="images/char5.png">
    <div class="name">Character 5</div>
  </a>

</div>

</body>
</html>
